<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register | GUVI Internship</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card shadow-lg p-4 w-100" style="max-width:480px;">
    <div class="text-center mb-3">
      <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="48" fill="#4f46e5"/>
        <text x="50" y="65" font-size="40" text-anchor="middle" fill="#fff" font-family="Arial" font-weight="bold">G</text>
      </svg>
      <h4 class="mt-2 fw-bold">Create Account</h4>
      <p class="text-muted small">Register to get started</p>
    </div>
    <div id="alertBox" class="alert d-none" role="alert"></div>
    <div id="registerForm">
      <div class="mb-3">
        <label class="form-label fw-semibold">Full Name</label>
        <input type="text" id="name" class="form-control" placeholder="John Doe" required/>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="john@example.com" required/>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Min 6 characters" required/>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Confirm Password</label>
        <input type="password" id="confirmPassword" class="form-control" placeholder="Re-enter password" required/>
      </div>
      <button id="registerBtn" class="btn btn-primary w-100 fw-bold">
        <span id="btnText">Register</span>
        <span id="btnSpinner" class="spinner-border spinner-border-sm d-none ms-2"></span>
      </button>
    </div>
    <hr/>
    <p class="text-center small mb-0">
      Already have an account? <a href="login.html" class="text-primary fw-semibold">Login here</a>
    </p>
  </div>
</div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/register.js"></script>
</body>
</html>
